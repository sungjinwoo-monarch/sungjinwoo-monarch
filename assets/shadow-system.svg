<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
width="1400"
height="800"
viewBox="0 0 1400 800">

  <defs>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->

  <rect
    width="1400"
    height="800"
    fill="#050816"/>

  <!-- Border -->

  <rect
    x="10"
    y="10"
    width="1380"
    height="780"
    fill="none"
    stroke="#7C3AED"
    stroke-width="2"/>

  <!-- Title -->

  <text
    x="700"
    y="100"
    fill="#A855F7"
    font-size="64"
    font-weight="bold"
    text-anchor="middle"
    filter="url(#glow)">

    ⚔ SHADOW SYSTEM ⚔

  </text>

  <!-- Player -->

  <text
    x="700"
    y="160"
    fill="#FFFFFF"
    font-size="28"
    text-anchor="middle">

    PLAYER : MOHAMAD ISTAB AHAMAD

  </text>

  <text
    x="700"
    y="200"
